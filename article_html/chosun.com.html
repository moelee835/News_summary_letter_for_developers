        </iframe></noscript><div id="fusion-app"><div style="display:none" id="article" data-fusion-collection="layouts" data-fusion-type="article" data-fusion-message="Could not render component [layouts:article]"></div></div><script id="fusion-metadata" type="application/javascript">window.Fusion=window.Fusion||{};Fusion.arcSite="chosun";Fusion.contextPath="/pf";Fusion.mxId="00000000";Fusion.deployment="2194";Fusion.globalContent={"_id":"YC475E62ERHT7GTEBWL3C6I4SA","canonical_url":"/economy/tech_it/2026/03/12/YC475E62ERHT7GTEBWL3C6I4SA/","canonical_website":"chosun","content_elements":[{"_id":"RB2YDZD5DFKCBJ2WTZQST22COE","caption":"메타 로고/로이터 연합뉴스","credits":{"affiliation":[{"name":"YNA"}],"by":[{"name":"ALAIN JOCARD"}]},"height":4664,"resizedUrls":{"article_leadart":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=1280","article_leadart_lg":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=2560","article_lg":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=616","article_md":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=464","article_sm":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=216","social_share":"https://www.chosun.com/resizer/v2/RB2YDZD5DFKCBJ2WTZQST22COE.jpg?auth=8af002b8b38c7c98ca2662d2269daed51c37d7186aa32deedd12c678c4375b48&width=1200&height=630&smart=true"},"type":"image","url":"https://cloudfront-ap-northeast-1.images.arcpublishing.com/chosun/RB2YDZD5DFKCBJ2WTZQST22COE.jpg","width":6996},{"_id":"ZPNCUZNBHRBVTNGT6KJEQS3XB4","content":"메타가 자체 인공지능(AI) 칩을 선보였다. 메타는 최근 엔비디아·AMD 등과 대규모 AI 칩 공급 계약을 맺은 바 있는데, 자체 AI 칩까지 개발해 다양한 칩을 함께 사용하면서 특정 기업 의존도를 줄이고 전체 데이터센터 운영 효율을 높일 예정이다. ","type":"text"},{"_id":"IS4HKEVUSRANHH4LKP6Q2ULFA4","content":"여러 AI 기업이 자체 칩 개발 경쟁에 나서며 ‘칩 다양화’ 전략을 쓰고 있다. 이런 전략은 주요 기업에 고대역폭 메모리(HBM)를 납품하는 한국 반도체 업계에도 호재라는 분석이다.","type":"text"},{"_id":"J5XBUD6YSNGXTEPBL47SQRK2SY","content":"메타는 ‘메타 훈련·추론 가속기(MTIA)’ 칩 제품군인 MTIA 300과 400, 450, 500 등 자체 AI 칩 4종을 11일(현지 시각) 공개했다. 이 가운데 MTIA 300은 현재 생산에 돌입했고, 나머지 3종은 각각 약 6개월 주기로 내년까지 데이터센터에 배치할 계획이라고 밝혔다. MTIA 300은 페이스북·인스타그램 등에서 콘텐츠를 추천해주는 모델에 최적화한 칩이다. ‘아이리스’라는 코드명으로 알려진 MTIA 400은 이를 기반으로 생성형 AI 모델 지원을 추가한 칩이다. MTIA 450과 MTIA 500은 AI 추론에 특화한 칩으로, 추론 성능의 핵심인 HBM의 대역폭을 크게 늘린 것이 특징이다.","type":"text"},{"_id":"3EONZQF5KBH4DKXC3Z7S3J4P7U","content":"메타는 엔비디아·AMD의 그래픽처리장치(GPU) 등 외부 칩을 도입하는 것과 자체 칩을 생산하는 것을 병행하는 데 대해 “주류 칩은 가장 까다로운 작업인 AI 훈련을 위해 설계돼 추론과 같은 작업에는 비용 효율성이 떨어진다”며 “MTIA는 반대로 추론에 최적화했다”고 설명했다. ","type":"text"},{"_id":"47Q2VR3XCJESRPREDJH2BOG4DU","content":"메타를 비롯한 여러 AI 기업에선 이처럼 ‘칩 다양화’ 전략을 쓰고 있다. 범용 AI 칩 하나로 모든 학습·추론 작업을 처리하는 것보다, 용도에 맞는 칩을 나눠 쓰면 가격 대비 성능과 전력 효율을 높일 수 있기 때문이다. 또 AI 인프라에서는 학습, 추론, 추천 시스템, 대규모 생성형 AI별로 워크로드가 서로 다른데, 용도별로 맞는 칩을 가동해 최적화할 수도 있다. ","type":"text"},{"_id":"UNIKRXEYZBHOJGVZMYPVJR2K7E","content":"마이크로소프트(MS)는 지난 1월 ‘마이아 200’이란 자체 AI 칩을 출시했다. 경량 연산 효율이 높은 것이 강점이다. 아마존도 ‘트레이니엄’ 칩 시리즈를 보유하고 있고, 구글 역시 텐서처리장치(TPU)를 개발하고 있다.","type":"text"},{"_id":"O32GUZDBJBGOLOPH72TCYLEDIY","content":"빅테크의 자체 칩 개발 경쟁이 치열해질수록 한국 반도체 업계에는 오히려 기회가 커질 수 있다는 분석도 나온다. 자체 AI 칩 역시 고성능 연산을 위해서는 HBM이 필수적이기 때문이다. 실제로 MS의 자체 AI 칩 ‘마이아 200’에는 SK하이닉스의 HBM이 들어간 것으로 알려졌다.","type":"text"}],"content_restrictions":{"content_code":"0"},"created_date":"2026-03-12T05:03:52.844Z","credits":{"by":[{"_id":"kang-daeun","additional_properties":{"original":{"bio":"실리콘밸리 특파원. 기술이 바꾸는 세상 이야기를 취재합니다. 글로벌 테크 이슈와 국내외 IT기업에 대해 다룹니다. 사회부, 국제부, 산업부 재계팀과 에너지팀 등을 거쳤습니다. ","byline":"실리콘밸리=강다은 특파원","email":"kkang@chosun.com","image":"https://author-service-images-prod-us-east-1.publishing.aws.arc.pub/chosun/b7d5a92f-81b2-4442-85c2 하고 생각을 공유한다는 과학소설(SF) 같은 콘셉트로 주목받았다. 이번 인수에 따라 슐리히트 CEO 등 몰트북 팀원들이 메타의 AI 조직인 초지능연구소(MSL)에 오는 16일부터 합류한다. 메타의 이번 인수..."},"headlines":{"basic":"메타, AI만의 SNS 몰트북 인수 ","mobile":""},"language":"","source":{"name":"Chosun","source_type":"staff","system":"composer"},"type":"story","_id":"LU5ZTABUHBCPTIVINS26UM3M2I","absolute_canonical_url":"https://www.chosun.com/economy/tech_it/2026/03/11/LU5ZTABUHBCPTIVINS26UM3M2I/","promo_items":{"basic":{"url":"https://cloudfront-ap-northeast-1.images.arcpublishing.com/chosun/MIYDKN3DGFRTCMBVG43GMZJQME.jpg","resizedUrls":{"1x1_sm":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=184&height=184&smart=true","1x1_md":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=400&height=400&smart=true","1x1_lg":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=560&height=560&smart=true","1x1_xxl":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=560&height=560&smart=true","4x3_sm":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=184&height=138&smart=true","4x3_md":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=400&height=300&smart=true","4x3_lg":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=560&height=420&smart=true","4x3_xxl":"https://www.chosun.com/resizer/v2/MIYDKN3DGFRTCMBVG43GMZJQME.jpg?auth=1a289a108b67ce5724821f51b232a67c372fd462f22331f57367c501c8f4f6e8&width=560&height=420&smart=true","16x9_sm":"htt nts":[],"inline_comments":[]},"content":"최근 아마존처럼 직원의 AI 활용 실태를 인사 평가에 반영하는 미국 기업들이 늘고 있다. 단순 AI 사용 장려를 넘어 사용을 압박하는 것이다. ","type":"text"},{"_id":"2JWGNEY3HFGULI33NRFUXPTQHY","additional_properties":{"comments":[],"inline_comments":[]},"content":"메타는 올해 중순부터 직원 평가 도구인 ‘체크포인트’를 도입해 직원들의 AI 사용을 평가할 예정이다. 직원이 AI를 사용해 생성한 코드의 양과 생산성 향상 정도를 수치화해 평가한다. 마크 저커버그 메타 최고경영자(CEO)는 작년 11월 “AI 기반 성과를 입증하는 직원들에게 더 높은 보상을 줄 것”이라고 말했다. 성과 상위 20% 직원에겐 기본 보너스의 200%, 극소수 최상위 성과자에겐 300%의 보너스를 지급하는 것이다. 마이크로소프트(MS)도 내부에서 AI 도구인 코파일럿 사용을 강하게 독려하고 있다. 이를 위해 엔지니어뿐 아니라 영업·마케팅·HR 인력까지 코파일럿 사용률을 추적한다. 구글 역시 AI 활용 능력을 성과에 반영한다.","type":"text"},{"_id":"CR7GAPKGQZCMDLR5XYKSRAF2IQ","additional_properties":{"comments":[],"inline_comments":[]},"content":"영국 파이낸셜타임스(FT)에 따르면, 컨설팅 기업 액센추어는 최근 시니어 직원에게 AI 도구 활용 여부를 임원 승진 평가에 반영한다고 공지했다. 세계 최대 음원 플랫폼 스포티파이, 교육 플랫폼 듀오링고도 직원들의 AI 성과를 평가 중이다.","type":"text"},{"_id":"U75ZNACHIRBXJD6UNDEQBBZLNQ","additional_properties":{"comments":[],"inline_comments":[]},"content":"그러나 이런 AI 성과 평가에 대한 직원들의 불만도 나온다. AI 활용 평가가 결국 구조조정의 근거로 활용될 수 있다는 우려 때문이다. ","type":"text"}],"description":{"basic":"아마존은 최근 ‘클래리티’라는 내부 시스템을 활용해 직원들의 AI 도구 사용 빈도를 추적하고 있다. 직원들이 어떤 AI 도구를 사용하는지, 아마존 자체 AI인 ‘키로’(Kiro)를 얼마나 쓰는지 등을 확인해, 이를 승진 및 직원들의 인사 평가에 활용한다. 최근 아마존처럼 직원의 AI 활용 실태를 인사 평가에 반영하는 미국 기업들이 늘고 있다. 단순 AI 사용 장려를 넘어 사용을 압박하는 것이다.  메타는 올해 중순부터 직원 평가 도구인 ‘체크포인트’를 도입해 직원들의 AI 사용을 평가할 예정이다. 직원이 AI를 사용해 생성한 코드의 양과 생산성 향상 정도를 수치화해 평가한다. 마크 저커버그 메타 최고경영자(CEO)는 작년 11월 “AI 기반 성과를 입증하는 직원들에게 더 높은 보상을 줄 것”이라고 말했다. ..."},"headlines":{"basic":"아마존·메타… 직원 AI 사용 실태를 인사 평가에 반영","mobile":""},"language":"","source":{"name":"Chosun","source_type":"staff","system":"composer"},"type":"story","_id":"MII7A6HASNHMFA32326MD3ZTWU","absolute_canonical_url":"https://www.chosun.com/economy/tech_it/2026/03/12/MII7A6HASNHMFA32326MD3ZTWU/"},{"canonical_url":"/economy/tech_it/2026/02/25/PAHVJH6KBNDOZLVVFFWB644WG4/","canonical_website":"chosun","content_elements":[{"_id":"ME4GINJYMI4DENBTG5QWIZJXG4","additional_properties er/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=184&height=30&smart=true","6x1_md":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=400&height=66&smart=true","6x1_lg":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=616&height=102&smart=true","6x1_xxl":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=1264&height=210&smart=true","article_sm":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=216","article_md":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=464","article_lg":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=616","article_leadart":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=1280","article_leadart_lg":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=2560","article_leadart_sm":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=768","social_share":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=1200&height=630&smart=true","cmc":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=5000&height=3218&smart=true","fusion_feed":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=5000&height=3218&smart=true","original":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=5000&height=3218&smart=true","author":"https://www.chosun.com/resizer/v2/ME4GINJYMI4DENBTG5QWIZJXG4.jpg?auth=917358d00f1ac0eb0db2ba20c1e5e3e2b1516246654ce58f69da6de8bdcc6170&width=108&height=108&smart=true"}},{"_id":"YZV7LQ24D5FJXCOVCS7IZ7BCV4","additional_properties":{"comments":[],"inline_comments":[]},"content":"올해부터 ‘개인용 초지능’으로 불리는 초고성능 인공지능(AI) 비서를 본격 구현하겠다는 목표를 세운 메타가 AMD와 1000억달러(약 143조원) 규모의 거대 AI 반도체 공급 계약을 맺었다고 24일(현지 시각) 밝혔다. 지난 17일 엔비디아와 수백억 달러 규모의 대형 반도체 공급 계약을 맺은 지 일주일 만이다. 향후 수년간 이어질 대형 AI 반도체 공급 계약이 선제적으로 이뤄지면서, 삼성전자·SK하이닉스가 주도하는 메모리 반도체에 대한 수요도 장기간 지속될 것이라는 분석이 나오고 있다.","type":"text"},{"_id":"BPUGW5LIMVD7XFS4ELYPQBV2U4","additional_properties":{"comments":[],"inline_comments":[]},"content":"이날 메타와 AMD는 향후 5년 동안 총 6GW(기가와트) 규모의 AMD AI 반도체 제품을 여러 세대에 걸쳐 메타에 공급하는 계약을 체결했다고 밝혔다. 마크 저커버그 메타 최고경영자(CEO)는 지난해 AI 경쟁에서 치고 나가기 위해 미국 오하이오주 ‘프로메테우스(1GW)’, 루이지애나주 ‘하이페리온(최대 5GW)’ 데이터센터 건설에 이어 장기적으로 미국 전역에 수십~수백GW 규모의 데이터센터를 설립한다는 구상을 밝힌 바 있다. 여러 빅테크가 한정된 AI 반도체 물량을 두고 경쟁하는 양상이다.","type":"text"},{"_id":"3BVBC3VL7FHCZHZYAUQTI6UVOI","additional_properties":{"comments":[],"inline_comments":[]},"content":"<b>◇‘AMD 칩+지분’ 메타에게로</b>","type":"text"},{"_id":"MSOGF6BCING7TJ7DZ6MNA6EQDY","additional_properties":{"comments":[],"inline_comments":[]},"content":"이날 체결된 메타와 AMD의 계약은 AMD의 반도체 물량뿐 아니라 지분 확보에 대한 내용도 포함됐다. 메타가 계약 만기일인 2031년 2월까지 6GW 규모의 AMD 반도체를 모두 구입했을 때, 메타가 최대 1억6000만 AMD 주식을 주당 0.01달러에 취득할 수 있는 권리를 제공했다는 것이다. 이는 AMD 지분 10%에 해당하는 규모다. 대형 공급에 따라 AMD의 주가가 5년 후 지금보다 상승할 것을 염두에 두고, 수백억 달러에 달하는 지분 상승 이익을 메타에 ‘충성 보너스’로 주겠다는 것이다. ","type":"text"},{"_id":"LLBYKU3UYJD4BJTN2GLCCUKIWM","additional_properties":{"comments":[],"inline_comments":[]},"content":"AMD는 앞서 오픈AI와도 6GW 규모의 AI 반도체 공급 계약을 체결하며 동일하게 10% 수준의 1억6000만 주 구매권을 제공하기로 했다. AMD는 AI 반도체 시장에서 엔비디아에 이은 ‘2인자’로 꼽히지만 실제 시장 점유율은 7%로, 93%를 차지하는 엔비디아에 한참 못 미치는 수준이다. ","type":"text"},{"_id":"7JTY7QTWZRBWDBLSB2ZZZ7NJJ4","additional_properties":{"comments":[],"inline_comments":[]},"content":"AMD는 차세대 AI 추론 칩인 MI450 중 메타에 제공되는 물량을 메타 데이터센터 특화용으로 제작한다는 계획이다. 이는 AI 모델을 실제 운용하는 추론 단계에 사용되는 칩으로, 메타가 구상하는 ‘개인용 초지능’ 서비스에 필수다. 올해 하반기 가동될 예정인 오하이오 프로메테우스 데이터센터를 시작으로 메타의 데이터센터 전반에 적용될 예정이다. ","type":"text"},{"_id":"BSOUMMWMGVFFBDAJERPHUNUEDI","additional_properties":{"comments":[],"inline_comments":[]},"content":"<b>◇반도체 수요, 장기적 ‘맑음’</b>","type":"text"},{"_id":"KKAICFZ64VDTPHW7XMCXZ4LU4U","additional_properties":{"comments":[],"inline_comments":[]},"content":"이는 국내 반도체 산업에도 호재다. 삼성전자·SK하이닉스가 메모리 공급난에 따른 실적 상승으로 주가가 연일 최고가를 기록하는 가운데, 고대역폭 메모리(HBM)를 비롯한 한국 기업 주력 제품들에 대한 높은 수요가 장기적으로 지속될 것이라는 긍정적 신호다.","type":"text"},{"_id":"DLZTAWJBIZDEDFUSZ5JLKPKW64","additional_properties":{"comments":[],"inline_comments":[]},"content":"반도체 업계에서는 AMD가 공격적으로 판매를 늘리면서 삼성전자에 낙수 효과가 생길 것이라는 분석이 나온다. 반도체 업계 관계자는 “AMD의 AI 반도체 장사가 잘될수록 삼성전자의 HBM 시장 점유율과 파운드리 사업 모두 탄력을 받게 될 것”이라고 했다. ","type":"text"},{"_id":"D4JFYKLKZZGJTH3IMABWLLRIZ4","additional_properties":{"comments":[],"inline_comments":[]},"content":"AMD가 기존 AI 반도체에 삼성전자를 주요 HBM 공급사로 두고 있는 만큼, 차세대 AI 칩에도 삼성전자의 HBM4가 대거 탑재될 가능성이 크다는 것이다. 또 AMD의 공급 계약이 커질수록 대만 TSMC에서 소화하지 못하는 물량이 삼성전자 파운드리로 넘어올 가능성도 커진다. 이재용 삼성전자 회장은 지난해 미국 출장 중 리사 수 AMD CEO와 만나 AMD의 2나노(1나노는 10억분의 1m) 파운드리 수주를 논의한 것으로 알려졌다. ","type":"text"}],"description":{"basic":"올해부터 ‘개인용 초지능’으로 불리는 초고성능 인공지능(AI) 비서를 본격 구현하겠다는 목표를 세운 메타가 AMD와 1000억달러(약 143조원) 규모의 거대 AI 반도체 공급 계약을 맺었다고 24일(현지 시각) 밝혔다. 지난 17일 엔비디아와 수백억 달러 규모의 대형 반도체 공급 계약을 맺은 지 일주일 만이다. 향후 수년간 이어질 대형 AI 반도체 공급 계약이 선제적으로 이뤄지면서, 삼성전자·SK하이닉스가 주도하는 메모리 반도체에 대한 수요도 장기간 지속될 것이라는 분석이 나오고 있다. 이날 메타와 AMD는 향후 5년 동안 총 6GW(기가와트) 규모의 AMD AI 반도체 제품을 여러 세대에 걸쳐 메타에 공급하는 계약을 체결했다고 밝혔다. 마크 저커버그 메타 최고경영자(CEO)는 지난해 AI D6M3DXXAZVTTU/","description":{"basic":"한국 떡볶이 프랜차이즈 두끼가 대만 현지 법인이 한국 야구 대표팀을 비하하는 ‘혐한 마케팅’을 진행해 논란이 일자 공식 사과했다. 12일 두끼 본사 측은 “최근 두끼 대만에서 이벤트를 진행하면서 왜곡된 사실을 표현한 것을 확인했다”며 “불편함과 실망을 드린 모든 분께 진심으로 사과드린다”고 했다. 이어 “이 내용에 대해 인지한 즉시 현지 파트너사에 즉각적으로 게시물 삭제 요청 및 재발 방지를 위한 엄중한 주의를 전달했다”며 “앞으로 글로벌 매장 운영 가이드라인을 더 강화해 이 같은 일이 재발하지 않도록 하겠다”고 밝혔다. 논란은 지난 11일 두끼 대만 공식 소셜미디어(SNS)에 올라온 홍보 게시물에서 시작됐다. 게시물에는 한국인으로 추정되는 남성이 무릎을 꿇고 종이를 들고 사과하는 사진 여러 장이 올라왔다...."},"display_date":"2026-03-12T09:20:29.885Z","headlines":{"basic":"“WBC 점수 조작 죄송” 문구에 발칵...두끼 대만 ‘혐한 마케팅’ 논란","mobile":""},"label":{},"last_updated_date":"2026-03-12T10:48:33.615Z","promo_items":{"basic":{"resizedUrls":{"16x9_lg":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=616&height=346&focal=333,195","16x9_md":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=400&height=225&focal=333,195","16x9_sm":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=184&height=104&focal=333,195","16x9_xxl":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=660&height=371&focal=333,195","1x1_lg":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=616&height=616&focal=333,195","1x1_md":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=400&height=400&focal=333,195","1x1_sm":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BOY4IBBQ.jpg?auth=f2e726ad3546190a95eb8105275404501350ec1d27f42b718b7c2989070aad62&width=184&height=184&focal=333,195","1x1_xxl":"https://www.chosun.com/resizer/v2/DTX3WYU6ARA2LHJ472BO         function getUuid() {

          let userInfo = null;
          let uuid = null;
