        </iframe></noscript><div id="fusion-app"><div style="display:none" id="article" data-fusion-collection="layouts" data-fusion-type="article" data-fusion-message="Could not render component [layouts:article]"></div></div><script id="fusion-metadata" type="application/javascript">window.Fusion=window.Fusion||{};Fusion.arcSite="chosunbiz";Fusion.contextPath="/pf";Fusion.mxId="00000000";Fusion.deployment="434";Fusion.globalContent={"_id":"K62RKAH4Z5BYTFGOZDYJIEEW7I","canonical_url":"/it-science/ict/2026/03/12/K62RKAH4Z5BYTFGOZDYJIEEW7I/","canonical_website":"chosunbiz","content_elements":[{"_id":"5C4MLGZDUFGYTAHHQQ63BA7BNA","additional_properties":{},"caption":"페이스북 모회사 메타의 자체 제작 AI 칩 ‘메타 훈련·추론 가속기(MTIA)’ / 메타 제공","credits":{"affiliation":[]},"height":1672,"resizedUrls":{"article_leadart":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=1280","article_leadart_lg":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=1920&height=1672&smart=true","article_lg":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=616","article_md":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=464","article_sm":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=216","social_share":"https://biz.chosun.com/resizer/v2/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg?auth=a08861596469cba3a081f447fe389174f9d27858d1ee8c86be49acce5c868fc9&width=1200&height=630&smart=true"},"type":"image","url":"https://cloudfront-ap-northeast-1.images.arcpublishing.com/chosunbiz/5C4MLGZDUFGYTAHHQQ63BA7BNA.jpg","width":1920},{"_id":"QOFFHNJEJ5HQHJSLZILWEWBFV4","additional_properties":{},"content":"페이스북 모회사 메타가 자체 제작한 인공지능(AI) 칩 4종을 11일(현지시각) 공개했다. 엔비디아, AMD, 구글 등과 대규모 AI 칩 공급 계약을 맺은 메타가 자체 제작 AI 칩 새로 선보이면서 최근 불거졌던 개발 난항설을 불식했다.","type":"text"},{"_id":"PIR7RQBVPBBF7NTWL2XUB2RCVU","additional_properties":{},"content":"메타는 자체 제작 AI 칩인 ‘메타 훈련·추론 가속기(MTIA)’ 제품군인 MTIA 300과 400, 450, 500 등 4종을 이날 블로그를 통해 선보였다. 이지운 송 메타 엔지니어링 담당 부사장은 CNBC에 “메타가 자체 설계한 칩을 대만 TSMC가 생산한다”라며 이런 방식은 외부 반도체 기업에만 의존하는 것보다 데이터센터 전반에서 가격 대비 성능을 높일 수 있다고 설명했다.","type":"text"},{"_id":"J2DJO5JKINAVBJKOALTK5BNOZU","additional_properties":{},"content":"새로 공개된 AI 칩 중 MTIA 300은 이미 생산에 돌입해 일부는 데이터센터에 배치했다. MTIA 300은 페이스북·인스타그램 등 메타의 소셜미디어(SNS) 플랫폼에서 콘텐츠나 광고를 추천해주는 모델에 최적화된 칩이다. ","type":"text"},{"_id":"KBPKV5OMPJCQZHDBRCOXPYOPBI","additional_properties":{},"content":"앞으로 출시될 MTIA 400, 450, 500은 각각 약 6개월 주기로 내년까지 데이터센터에 배치할 계획이다. ‘아이리스’라는 코드명으로 알려진 MTIA 400은 생성형 AI 모델을 지원하는 칩이다. 사용자의 요청을 기반으로 이미지나 영상을 생성하는 작업 등이 이에 해당된다.","type":"text"},{"_id":"HHQRK4NEWBAWJJG4ZLFPCFDJQM","additional_properties":{},"content":"MTIA 450과 500은 AI 추론에 특화한 칩으로, 추론 성능의 핵심인 고대역폭메모리(HBM)의 대역폭을 크게 늘린 것이 특징이다.","type":"text"},{"_id":"BIG72LIVNNCCDMKV6L3TVBPOMI","additional_properties":{},"content":"메타는 엔비디아·AMD의 그래픽처리장치(GPU) 등 외부 칩을 도입하는 것과 자체 칩을 생산하는 것을 병행하는 데 대해 “주류 칩은 가장 까다로운 작업인 AI 훈련을 위해 설계돼 추론과 같은 작업에는 비용 효율성이 떨어진다”며 “MTIA는 반대로 추론에 최적화했다”고 설명했다.","type":"text"},{"_id":"NQWVDRBYTNB4BLF3CIOO3PEBMU","additional_properties":{},"content":"송 부사장은 “AI 모델이 전통적인 칩 개발 주기보다 더 빠르게 진화하고 있다”며 “우리는 단일 설계에 장기적으로 베팅하기보다 반복해서 개선하기로 했다”고 개발 주기를 6개월 단위로 짧게 설정한 전략의 배경을 설명했다. 훈련용으로는 외부 칩을 도입하고, 추론용으로는 자체 칩을 생산해 효율성을 높인다는 전략이다.","type":"text"},{"_id":"Z2OZ462XFRD5HP7YCPO55PL2EI","additional_properties":{},"content":"다만 송 부사장은 전 세계적인 메모리 칩 부족 현상을 걱정하기도 했다. 그는 “HBM 공급 (부족) 상황을 우려하고 있다”면서도 “이미 계획 중인 생산량에 맞춰 (메모리) 물량은 충분히 확보했다고 믿는다”고 했다.","type":"text"}],"created_date":"2026-03-12T06:28:14.824Z","credits":{"by":[{"_id":"lee-jaeeun","additional_properties":{"original":{"byline":"이재은 기자","email":"jaeeunlee@chosunbiz.com","image":"
